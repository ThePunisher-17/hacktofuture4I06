name: CI Baseline

on:
  push:
    branches: [ main, "dev-*" ]
  pull_request:
    branches: [ main ]

jobs:
  lint: # Updated ID to match protection.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.11'
      - name: Install dependencies
        run: make install
      - name: Run Lint & Format Check
        run: make fl

  test: # Updated ID to match protection.json
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_DB: voice_to_action
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.11'
      - name: Install dependencies
        run: make install
      - name: Run Tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/voice_to_action
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-key
        run: make test